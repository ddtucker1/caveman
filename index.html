<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildborn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1f16;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #e8e4d4;
    }
    #game-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #2a3324;
      cursor: crosshair;
    }
    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #hud-top {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      text-shadow: 0 1px 2px #000;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-label { width: 52px; opacity: 0.85; }
    .bar {
      width: 140px;
      height: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 100%;
    }
    #bar-health > span { background: #c44; }
    #bar-hunger > span { background: #c90; }
    #bar-thirst > span { background: #48a; }
    #bar-stamina > span { background: #6a6; }
    #seed-display {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 12px;
      opacity: 0.9;
      text-shadow: 0 1px 2px #000;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 10px;
      border-radius: 4px;
    }
    #btn-census,
    #btn-speed {
      position: absolute;
      right: 12px;
      pointer-events: auto;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #e8e4d4;
      text-shadow: 0 1px 2px #000;
    }
    #btn-census { top: 44px; }
    #btn-speed { top: 76px; }
    #btn-census:hover,
    #btn-speed:hover {
      filter: brightness(1.15);
      border-color: rgba(255, 255, 255, 0.4);
    }
    #btn-speed.active {
      border-color: rgba(180, 220, 120, 0.7);
      color: #d8f0a8;
      background: rgba(40, 60, 20, 0.7);
    }
    #btn-census.hidden,
    #btn-speed.hidden { display: none; }
    #census-window {
      position: absolute;
      top: 112px;
      right: 12px;
      width: min(420px, 92vw);
      pointer-events: auto;
      background: rgba(12, 16, 10, 0.82);
      border: 1px solid rgba(220, 210, 160, 0.35);
      border-radius: 6px;
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      user-select: none;
      z-index: 20;
    }
    #census-window.hidden { display: none; }
    #census-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      cursor: move;
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(220, 210, 160, 0.25);
      border-radius: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #census-close {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #ffffff;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      opacity: 0.85;
    }
    #census-close:hover { opacity: 1; }
    #census-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px 12px 12px;
      font-size: 12px;
    }
    .census-col-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .census-col-title.plants { color: #8fd050; }
    .census-col-title.animals { color: #d4c48a; }
    .census-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      white-space: nowrap;
    }
    .census-icon {
      width: 1.4em;
      text-align: center;
      flex: 0 0 auto;
    }
    .census-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .census-count { flex: 0 0 auto; font-variant-numeric: tabular-nums; opacity: 0.95; }
    .census-sep {
      height: 0;
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.28);
      margin: 8px 0;
    }
    #inspector-window {
      position: absolute;
      left: 0;
      top: 0;
      width: min(260px, 80vw);
      pointer-events: auto;
      background: rgba(10, 12, 14, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 6px;
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      user-select: none;
      z-index: 25;
      font-size: 12px;
    }
    #inspector-window.hidden { display: none; }
    #inspector-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 10px;
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #inspector-titlebar.plant { color: #7dce55; }
    #inspector-titlebar.herbivore { color: #f0d84a; }
    #inspector-titlebar.predator { color: #e05545; }
    #inspector-close {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #ffffff;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      opacity: 0.85;
    }
    #inspector-close:hover { opacity: 1; }
    #inspector-body {
      padding: 8px 12px 10px;
      line-height: 1.55;
    }
    #inspector-body .insp-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      white-space: nowrap;
    }
    #inspector-body .insp-label {
      opacity: 0.75;
      flex: 0 1 auto;
    }
    #inspector-body .insp-value {
      font-variant-numeric: tabular-nums;
      text-align: right;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 12px;
      opacity: 0.75;
      text-shadow: 0 1px 2px #000;
      line-height: 1.5;
    }
    /* New-game overlay (pointer events enabled) */
    #menu {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 8, 0.82);
      pointer-events: auto;
    }
    #menu.hidden { display: none; }
    #menu-panel {
      background: #24301c;
      border: 1px solid #4a5c38;
      border-radius: 8px;
      padding: 28px 32px;
      width: min(360px, 92vw);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    #menu-panel h1 {
      font-size: 28px;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      color: #d4c48a;
    }
    #menu-panel p {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 18px;
    }
    #menu-panel label {
      display: block;
      text-align: left;
      font-size: 12px;
      margin-bottom: 6px;
      opacity: 0.85;
    }
    #seed-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #4a5c38;
      border-radius: 4px;
      background: #1a2214;
      color: #e8e4d4;
      font-size: 14px;
      margin-bottom: 14px;
    }
    #menu-panel button {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 10px 18px;
      font-size: 14px;
      margin: 4px;
      background: #5a7a3a;
      color: #f0ecd8;
    }
    #menu-panel button.secondary {
      background: #3a4830;
    }
    #menu-panel button:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>

    <div id="ui">
      <div id="hud-top">
        <div class="bar-row">
          <span class="bar-label">Health</span>
          <div class="bar" id="bar-health"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Hunger</span>
          <div class="bar" id="bar-hunger"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Thirst</span>
          <div class="bar" id="bar-thirst"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Stamina</span>
          <div class="bar" id="bar-stamina"><span></span></div>
        </div>
      </div>

      <div id="seed-display">Seed: —</div>
      <button id="btn-census" class="hidden" type="button" title="Toggle Ecosystem Census (Tab)">Census</button>
      <button id="btn-speed" class="hidden" type="button" title="Toggle 3× game speed">Speed 3×</button>

      <div id="census-window" class="hidden" role="dialog" aria-label="Ecosystem Census">
        <div id="census-titlebar">
          <span>Ecosystem Census</span>
          <button id="census-close" type="button" aria-label="Close">×</button>
        </div>
        <div id="census-body">
          <div id="census-plants">
            <div class="census-col-title plants">PLANTS</div>
            <div id="census-plant-rows"></div>
          </div>
          <div id="census-animals">
            <div class="census-col-title animals">ANIMALS</div>
            <div id="census-animal-rows"></div>
          </div>
        </div>
      </div>

      <div id="inspector-window" class="hidden" role="dialog" aria-label="Entity Inspector">
        <div id="inspector-titlebar">
          <span id="inspector-title">Entity</span>
          <button id="inspector-close" type="button" aria-label="Close">×</button>
        </div>
        <div id="inspector-body"></div>
      </div>

      <div id="help">
        WASD / Arrows — move &nbsp;·&nbsp; 400×400 map<br />
        Tab — census &nbsp; L — legend &nbsp; F3 — debug<br />
        Click entity — inspect &nbsp;·&nbsp; Hover for tooltip
      </div>
    </div>

    <div id="menu">
      <div id="menu-panel">
        <h1>WILDBORN</h1>
        <p>A procedurally evolving survival world</p>
        <label for="seed-input">World seed (leave blank for random)</label>
        <input id="seed-input" type="text" placeholder="e.g. wildborn-42" autocomplete="off" />
        <div>
          <button id="btn-random" class="secondary" type="button">Random Seed</button>
          <button id="btn-start" type="button">Start Game</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load order matters: each file attaches to window.Wildborn -->
  <script src="src/config.js"></script>
  <script src="src/rng.js"></script>
  <script src="src/world.js"></script>
  <script src="src/player.js"></script>
  <script src="src/camera.js"></script>
  <script src="src/spatial.js"></script>
  <script src="src/pathfind.js"></script>
  <script src="src/plant.js"></script>
  <script src="src/animal.js"></script>
  <script src="src/ecosystem.js"></script>
  <script src="src/shapes.js"></script>
  <script src="src/renderShapes.js"></script>
  <script src="src/render.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
