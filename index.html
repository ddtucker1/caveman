<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildborn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1f16;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #e8e4d4;
    }
    #game-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #2a3324;
      cursor: crosshair;
    }
    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #hud-top {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      text-shadow: 0 1px 2px #000;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-label { width: 52px; opacity: 0.85; }
    .bar {
      width: 140px;
      height: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 100%;
    }
    #bar-health > span { background: #c44; }
    #bar-hunger > span { background: #c90; }
    #bar-thirst > span { background: #48a; }
    #bar-stamina > span { background: #6a6; }
    #seed-display {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 12px;
      opacity: 0.9;
      text-shadow: 0 1px 2px #000;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 10px;
      border-radius: 4px;
    }
    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 12px;
      opacity: 0.75;
      text-shadow: 0 1px 2px #000;
      line-height: 1.5;
    }
    /* New-game overlay (pointer events enabled) */
    #menu {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 8, 0.82);
      pointer-events: auto;
    }
    #menu.hidden { display: none; }
    #menu-panel {
      background: #24301c;
      border: 1px solid #4a5c38;
      border-radius: 8px;
      padding: 28px 32px;
      width: min(360px, 92vw);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    #menu-panel h1 {
      font-size: 28px;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      color: #d4c48a;
    }
    #menu-panel p {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 18px;
    }
    #menu-panel label {
      display: block;
      text-align: left;
      font-size: 12px;
      margin-bottom: 6px;
      opacity: 0.85;
    }
    #seed-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #4a5c38;
      border-radius: 4px;
      background: #1a2214;
      color: #e8e4d4;
      font-size: 14px;
      margin-bottom: 14px;
    }
    #menu-panel button {
      pointer-events: auto;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 10px 18px;
      font-size: 14px;
      margin: 4px;
      background: #5a7a3a;
      color: #f0ecd8;
    }
    #menu-panel button.secondary {
      background: #3a4830;
    }
    #menu-panel button:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>

    <div id="ui">
      <div id="hud-top">
        <div class="bar-row">
          <span class="bar-label">Health</span>
          <div class="bar" id="bar-health"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Hunger</span>
          <div class="bar" id="bar-hunger"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Thirst</span>
          <div class="bar" id="bar-thirst"><span></span></div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Stamina</span>
          <div class="bar" id="bar-stamina"><span></span></div>
        </div>
      </div>

      <div id="seed-display">Seed: —</div>

      <div id="help">
        WASD / Arrows — move &nbsp;·&nbsp; 200×200 map<br />
        L — species legend &nbsp; F3 — ecosystem debug<br />
        Hover an entity for calories, age &amp; state
      </div>
    </div>

    <div id="menu">
      <div id="menu-panel">
        <h1>WILDBORN</h1>
        <p>A procedurally evolving survival world</p>
        <label for="seed-input">World seed (leave blank for random)</label>
        <input id="seed-input" type="text" placeholder="e.g. wildborn-42" autocomplete="off" />
        <div>
          <button id="btn-random" class="secondary" type="button">Random Seed</button>
          <button id="btn-start" type="button">Start Game</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load order matters: each file attaches to window.Wildborn -->
  <script src="src/config.js"></script>
  <script src="src/rng.js"></script>
  <script src="src/world.js"></script>
  <script src="src/player.js"></script>
  <script src="src/camera.js"></script>
  <script src="src/spatial.js"></script>
  <script src="src/pathfind.js"></script>
  <script src="src/plant.js"></script>
  <script src="src/animal.js"></script>
  <script src="src/ecosystem.js"></script>
  <script src="src/shapes.js"></script>
  <script src="src/renderShapes.js"></script>
  <script src="src/render.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
